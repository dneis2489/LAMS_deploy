input {
  kafka {
    bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"
    topics => ["${LAMS_LOGS_TOPIC:lams.logs}"]
    group_id => "${LAMS_LOGSTASH_GROUP_ID:lams-logstash}"
    codec => json {
      ecs_compatibility => disabled
    }
    auto_offset_reset => "latest"
  }
}

filter {
  if ![log_date] {
    mutate {
      add_field => { "log_date" => "%{@timestamp}" }
    }
  }

  if ![action_rus] and [event] {
    mutate {
      add_field => { "action_rus" => "%{[event]}" }
    }
  }

  if ![action_eng] and [event] {
    mutate {
      add_field => { "action_eng" => "%{[event]}" }
    }
  }

  ruby {
    code => '
      require "json"
      event_hash = event.to_hash.reject { |key, _| key.start_with?("@") }
      event.set("log_data", JSON.generate(event_hash))
    '
  }
}

output {
  jdbc {
    driver_jar_path => "${POSTGRES_JDBC_DRIVER_PATH:/usr/share/logstash/vendor/jar/jdbc/postgresql.jar}"
    driver_class => "org.postgresql.Driver"
    connection_string => "${LAMS_DB_URL:jdbc:postgresql://localhost:5433/LAMS}"
    username => "${LAMS_DB_USERNAME:postgres}"
    password => "${LAMS_DB_PASSWORD:admin}"
    statement => [
      "SELECT public.ingest_kafka_log(?::uuid, ?, ?, ?, ?::integer, ?::timestamptz, ?, ?::jsonb, ?, ?::integer)",
      "correlation_id",
      "microservice_name",
      "action_eng",
      "action_rus",
      "request_status_code",
      "log_date",
      "log_type_name",
      "log_data",
      "username",
      "duration"
    ]
  }
}
