spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:lams_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
  session:
    jdbc:
      initialize-schema: never

security:
  jwt:
    secret: test-jwt-secret-for-lams-tests-32-bytes-minimum
